name: Test PDF Tools

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pdf2image pytesseract pandas openpyxl
      
      - name: Run tests
        run: |
          pytest tests/ -v || echo "No tests found, running basic checks"
          python -c "from merge import merge_pdfs; print(Merge OK)"
          python -c "from split import split_pdf; print(Split OK)"
          python -c "from compress import compress_pdf; print(Compress OK)"
          python -c "from watermark import add_watermark; print(Watermark OK)"
          python -c "from protect import encrypt_pdf; print(Protect OK)"
          python -c "from unlock import unlock_pdf; print(Unlock OK)"
          python -c "from rotate import rotate_pages; print(Rotate OK)"
      
      - name: Lint code
        run: |
          pip install pylint
          pylint *.py --disable=all --enable=E || true

